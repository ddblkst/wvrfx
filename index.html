    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            padding: 0;
        }

        body.dark {
            background: #0a0a0a;
            color: #e0e0e0;
        }

        body.light {
            background: #f5f5f5;
            color: #1a1a1a;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        body.light .top-bar {
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .top-bar .brand {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 6px;
        }

        body.dark .top-bar .brand {
            color: #ffffff;
        }

        body.light .top-bar .brand {
            color: #000000;
        }

        .top-bar .theme-btn {
            font-size: 30px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 15px;
            transition: transform 0.2s;
            opacity: 0.5;
        }

        .top-bar .theme-btn:hover {
            transform: scale(1.2);
            opacity: 1;
        }

        .top-bar .theme-btn.active {
            opacity: 1;
        }

        /* ===== MENU ===== */
        .menu-bar {
            display: flex;
            gap: 5px;
            padding: 10px 30px;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-wrap: wrap;
        }

        body.light .menu-bar {
            background: rgba(0, 0, 0, 0.05);
        }

        .menu-bar button {
            background: none;
            border: none;
            padding: 8px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }

        body.dark .menu-bar button {
            color: #888;
        }

        body.light .menu-bar button {
            color: #666;
        }

        .menu-bar button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        body.light .menu-bar button:hover {
            background: rgba(0, 0, 0, 0.1);
            color: #000;
        }

        .menu-bar button.active {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        body.light .menu-bar button.active {
            background: rgba(0, 0, 0, 0.1);
            color: #000;
        }

        /* ===== MAIN CONTENT ===== */
        .content {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== LINKS PAGE ===== */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .links-grid a {
            display: block;
            padding: 20px 30px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            text-align: center;
            border: 2px solid currentColor;
            border-radius: 8px;
            transition: all 0.3s;
            cursor: pointer;
        }

        body.dark .links-grid a {
            color: #e0e0e0;
            border-color: #333;
        }

        body.light .links-grid a {
            color: #1a1a1a;
            border-color: #ccc;
        }

        .links-grid a:hover {
            transform: translateY(-3px);
            background: currentColor;
        }

        body.dark .links-grid a:hover {
            color: #0a0a0a;
        }

        body.light .links-grid a:hover {
            color: #f5f5f5;
        }

        /* ===== STRATEGIES PAGE ===== */
        .strategy-section {
            margin-bottom: 40px;
        }

        .strategy-section-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid;
            opacity: 0.6;
        }

        body.dark .strategy-section-title {
            border-color: rgba(255, 255, 255, 0.15);
        }

        body.light .strategy-section-title {
            border-color: rgba(0, 0, 0, 0.15);
        }

        .strategy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .strategy-item {
            padding: 30px 20px;
            text-align: center;
            border: 2px solid currentColor;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        body.dark .strategy-item {
            border-color: #333;
        }

        body.light .strategy-item {
            border-color: #ccc;
        }

        .strategy-item:hover {
            transform: translateY(-3px) scale(1.02);
            background: currentColor;
        }

        body.dark .strategy-item:hover {
            color: #0a0a0a;
        }

        body.light .strategy-item:hover {
            color: #f5f5f5;
        }

        /* Full-width strategy item for single entry */
        .strategy-item.full-width {
            grid-column: 1 / -1;
            max-width: 500px;
            margin: 0 auto;
            font-size: 13px;
            letter-spacing: 0.3px;
            line-height: 1.5;
            padding: 24px 20px;
            cursor: default;
            border-style: dashed;
            opacity: 0.85;
        }

        .strategy-item.full-width:hover {
            transform: none;
            background: none;
        }

        body.dark .strategy-item.full-width:hover {
            color: #e0e0e0;
        }

        body.light .strategy-item.full-width:hover {
            color: #1a1a1a;
        }

        /* ===== INPUTS PAGE ===== */
        .inputs-container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .input-group {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 18px 20px;
        }

        body.light .input-group {
            border-color: rgba(0, 0, 0, 0.08);
        }

        .input-group-title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            padding-bottom: 6px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        body.light .input-group-title {
            border-bottom-color: rgba(0, 0, 0, 0.1);
        }

        .input-item {
            padding: 4px 0;
            font-size: 13px;
            font-weight: 400;
            opacity: 0.9;
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: default;
        }

        .input-item::before {
            content: "▪ ";
            opacity: 0.4;
            flex-shrink: 0;
        }

        /* ===== TOOLTIP QUESTION MARK ===== */
        .qmark-tip {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            font-size: 10px;
            font-weight: bold;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.15s ease;
            flex-shrink: 0;
            margin-left: 2px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            line-height: 1;
            text-align: center;
        }

        body.light .qmark-tip {
            background: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.25);
            color: #333;
        }

        body.dark .qmark-tip {
            color: #ccc;
        }

        .qmark-tip:active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            transform: scale(0.9);
        }

        body.light .qmark-tip:active {
            background: rgba(0, 0, 0, 0.2);
            border-color: #000;
        }

        /* ===== TOOLTIP POPUP ===== */
        .weaver-tooltip {
            position: absolute;
            background: #1a1a1a;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #e0e0e0;
            font-size: 0.75rem;
            font-weight: normal;
            padding: 8px 14px;
            border-radius: 12px;
            font-family: 'Segoe UI', monospace;
            max-width: 280px;
            z-index: 10000;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8);
            pointer-events: none;
            white-space: normal;
            word-break: break-word;
            line-height: 1.4;
            backdrop-filter: blur(4px);
        }

        body.light .weaver-tooltip {
            background: #ffffff;
            border-color: rgba(0, 0, 0, 0.2);
            color: #1a1a1a;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        @media (max-width: 600px) {
            .top-bar {
                padding: 12px 15px;
            }

            .top-bar .brand {
                font-size: 20px;
                letter-spacing: 4px;
            }

            .top-bar .theme-btn {
                font-size: 24px;
                padding: 5px 10px;
            }

            .menu-bar {
                padding: 8px 15px;
                gap: 3px;
            }

            .menu-bar button {
                padding: 6px 14px;
                font-size: 12px;
            }

            .content {
                padding: 15px;
            }

            .inputs-container {
                grid-template-columns: 1fr;
            }

            .strategy-item.full-width {
                font-size: 11px;
                padding: 18px 14px;
            }
        }
    </style>
</head>

    <script>
        // ===== THEME TOGGLE =====
        const body = document.body;
        const sunBtn = document.getElementById('sunBtn');
        const moonBtn = document.getElementById('moonBtn');

        sunBtn.addEventListener('click', () => {
            body.classList.remove('dark');
            body.classList.add('light');
            sunBtn.classList.add('active');
            moonBtn.classList.remove('active');
        });

        moonBtn.addEventListener('click', () => {
            body.classList.remove('light');
            body.classList.add('dark');
            moonBtn.classList.add('active');
            sunBtn.classList.remove('active');
        });

        // Default: moon active
        moonBtn.classList.add('active');

        // ===== MENU NAVIGATION =====
        const menuButtons = document.querySelectorAll('.menu-bar button');
        const pages = {
            links: document.getElementById('page-links'),
            strategies: document.getElementById('page-strategies'),
            inputs: document.getElementById('page-inputs')
        };

        menuButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                menuButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const pageName = btn.dataset.page;
                Object.keys(pages).forEach(key => {
                    pages[key].classList.toggle('active', key === pageName);
                });
            });
        });

        // ===== RENDER INPUTS =====

            const container = document.getElementById('inputsContainer');
            let html = '';

            inputGroups.forEach(group => {
                html += `
                    <div class="input-group">
                        <div class="input-group-title">${group.group}</div>
                `;
                group.inputs.forEach(input => {
                    html += `<div class="input-item">${input.name}<span class="qmark-tip" data-tip="${input.tip}">?</span></div>`;
                });
                html += `</div>`;
            });

            container.innerHTML = html;
        }

        renderInputs();

        // ===== TOOLTIP SYSTEM =====
        function initTooltips() {
            let activeTooltip = null;
            let activeTrigger = null;

            function positionTooltip(tooltip, trigger) {
                const rect = trigger.getBoundingClientRect();
                let left = rect.left + (rect.width / 2) - 20;
                let top = rect.bottom + 8 + window.scrollY;

                // Keep within horizontal bounds
                if (left < 5) left = 5;
                if (left + 280 > window.innerWidth) left = window.innerWidth - 290;

                // If tooltip would go below viewport, show above
                if (rect.bottom + 80 > window.innerHeight) {
                    top = rect.top - 10 + window.scrollY - tooltip.offsetHeight;
                }

                tooltip.style.left = left + 'px';
                tooltip.style.top = top + 'px';
            }

            function removeTooltip() {
                if (activeTooltip) {
                    activeTooltip.remove();
                    activeTooltip = null;
                    activeTrigger = null;
                }
            }

            // Handle scroll — reposition tooltip
            window.addEventListener('scroll', () => {
                if (activeTooltip && activeTrigger) {
                    positionTooltip(activeTooltip, activeTrigger);
                }
            }, { passive: true });

            // Handle resize — reposition tooltip
            window.addEventListener('resize', () => {
                if (activeTooltip && activeTrigger) {
                    positionTooltip(activeTooltip, activeTrigger);
                }
            });

            document.addEventListener('click', function(e) {
                const qmark = e.target.closest('.qmark-tip');
                
                // If clicking the same trigger, just close
                if (qmark && qmark === activeTrigger) {
                    removeTooltip();
                    return;
                }

                // Remove existing tooltip
                removeTooltip();

                // If clicked on a qmark, show tooltip
                if (qmark) {
                    e.stopPropagation();
                    const tipText = qmark.getAttribute('data-tip');
                    if (!tipText) return;

                    const div = document.createElement('div');
                    div.className = 'weaver-tooltip';
                    div.innerText = tipText;
                    document.body.appendChild(div);

                    activeTooltip = div;
                    activeTrigger = qmark;

                    positionTooltip(div, qmark);
                }
            });

            // Close tooltip on Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    removeTooltip();
                }
            });
        }

        initTooltips();
    </script>

</body>
